<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .navbar {
        height: 50px;
        display: flex;
        align-items: center;
        padding-left: 50px;
      }

      .account-body {
        height: 100vh;
        display: flex;
        justify-content: center;
        background: #93ac882a;
      }

      .sign-up-box {
        height: 90%;
        width: 70%;
        background: #0000001b;
        border-radius: 15px;
      }

      .sign-create-box {
        height: 40px;
        width: 100%;
        background: #dae3dfd3;
        border-radius: 15px;
        overflow: hidden;
        display: flex;
        justify-content: space-between;
        margin-top: 30px;
      }

      .create-box {
        height: 100%;
        width: 45%;
        border-radius: 15px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 17px;
        cursor: pointer;
      }

      .sign-box {
        height: 100%;
        width: 45%;
        border-radius: 15px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 17px;
        cursor: pointer;
      }

      .welcome {
        margin-top: 35px;
        padding-left: 10px;
      }

      .welcome h3 {
        font-size: 30px;
      }

      .welcome p {
        margin-top: 8px;
        color: rgba(0, 0, 0, 0.358);
      }

      .sign-in-form {
        margin-left: 10px;
        margin-top: 40px;
        padding-right: 10px;
        font-size: large;
      }

      .input {
        border: none;
        border-radius: 5px;
        width: 100%;
        height: 30px;
        background: #f1f0f0;
      }

      .signn {
        background: #7fd2b9;
        color: rgb(238, 238, 235);
        font-size: large;
      }

      .company-advertise {
        display: none;
      }

      .create-form-box {
        display: none;
        margin-top: 30px;
        font-size: large;
      }

      .create-form-box h3 {
        font-size: 30px;
        margin-left: 10px;
      }

      .bg-active {
        background: #eae8e8;
      }

      @media (min-width: 1024px) {
        .navbar {
          display: none;
        }

        .account-body {
          justify-content: space-between;
        }

        .sign-up-box {
          height: 100vh;
          width: 48%;
          border-top-right-radius: 0px;
          border-bottom-right-radius: 0px;
        }

        .sign-box {
          font-size: 25px;
        }

        .create-box {
          font-size: 25px;
        }

        .company-advertise {
          display: block;
          height: 100vh;
          width: 40%;
          background: #0000005e;
          color: aliceblue;
          padding-left: 30px;
          padding-top: 30px;
          padding-right: 40px;
          border-top-right-radius: 20px;
          border-bottom-right-radius: 20px;
        }

        .company-name23 {
          display: block;
          height: 50px;
          font-size: x-large;
          font-weight: 800;
        }

        .company-advertise h2 {
          font-size: 30px;
        }

        .company-advertise p {
          font-size: 20px;
          margin-top: 20px;
          line-height: 30px;
          color: rgba(239, 242, 242, 0.729);
        }
      }
    </style>
  </head>

  <body>
    <nav class="navbar">YEUVA</nav>
    <div class="account-body">
      <div class="company-advertise">
        <div class="company-name23">YEUVA</div>
        <h2>Start Your <br />Online Business <br />Today</h2>
        <p>
          Join 12,000+ verified Indian resellers earning from the comfort of
          their home. No investment needed ~ just your identity
        </p>
      </div>
      <div class="sign-up-box">
        <div class="sign-create-box">
          <div class="sign-box bg-active">Sign in</div>
          <div class="create-box">Create Account</div>
        </div>
        <div class="welcome">
          <h3>Welcome back</h3>
          <p>Sign-in to your Yeuva Account</p>
        </div>
        <form action="" class="sign-in-form">
          <label for="">Email Address</label><br /><br />
          <input
            type="email"
            name=""
            id=""
            class="input"
            placeholder="yourname@gmail.com"
          /><br /><br />
          <label for="">Password</label><br /><br />
          <input type="password" name="" id="" class="input" /><br /><br />
          <input type="checkbox" name="" id="" />
          <label for="">Keep me signed in for 30days</label><br /><br />
          <input
            type="button"
            value="Sign in"
            class="input signn"
          /><br /><br />
        </form>
        <div class="create-form-box">
          <h3>Create your account</h3>

          <form action="" class="sign-in-form">
            <label for="">Full Name(as on Aadhar)</label><br /><br />
            <input
              type="text"
              placeholder="Dilip Yadav"
              class="input"
            /><br /><br />
            <label for="">Email Address</label><br /><br />
            <input
              type="email"
              name=""
              id=""
              class="input"
              placeholder="dilipyadav922908@gmail.com"
            /><br /><br />
            <label for="">Mobile Number</label><br /><br />
            <input
              type="tel"
              name=""
              id=""
              class="input"
              placeholder="9229081091"
            /><br /><br />
            <label for="">password</label><br /><br />
            <input
              type="password"
              name=""
              id=""
              class="input"
              placeholder="Min 8 characters"
            /><br /><br />
            <label for="">Confirm Password</label><br /><br />
            <input
              type="password"
              name=""
              id=""
              class="input"
              placeholder="Re-enter password"
            /><br /><br />
            <input type="button" value="Submit" class="input signn" />
          </form>
        </div>
      </div>
    </div>

    <script>
      const welcome = document.querySelector(".welcome");
      const createBox = document.querySelector(".create-box");
      const createFormBox = document.querySelector(".create-form-box");
      const signInForm = document.querySelector(".sign-in-form");
      const signBox = document.querySelector(".sign-box");

      createBox.addEventListener("click", () => {
        welcome.style.display = "none";
        signInForm.style.display = "none";
        createFormBox.style.display = "block";

        createBox.classList.add("bg-active");
        signBox.classList.remove("bg-active");
      });

      signBox.addEventListener("click", () => {
        createFormBox.style.display = "none";
        welcome.style.display = "block";
        signInForm.style.display = "block";
        createBox.classList.remove("bg-active");
        signBox.classList.add("bg-active");
      });
    </script>
  </body>
</html>
